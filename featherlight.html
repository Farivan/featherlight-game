   Everything you might want to hand-edit lives in the DATA sections

   they stand, or how strong a critter is.

     SECTION 1  — CONFIG & PALETTE

     SECTION 3  — TYPE CHART & MOVES
     SECTION 4  — ENEMIES (critters + the sparring bout)

     SECTION 9  — CHAPTER SCRIPTS (the story, stage by stage)
     SECTION 10 — PAINTED SCENES (the moody cinematic moments)

     SECTION 11 — small utilities
     SECTION 12 — game state (the "fact table" that changes as you play)
     SECTION 13 — input (keyboard)
     SECTION 14 — art generation (tiles & sprites drawn in code)
     SECTION 15 — world: movement, collision, camera, lighting
     SECTION 16 — dialogue & UI overlays
     SECTION 17 — cutscene runner

     SECTION 19 — chapter/stage driver, boot, main loop
   ================================================================== */

/* ==================================================================
   SECTION 3 — TYPE CHART & MOVES
   ------------------------------------------------------------------
   The triangle:  HEART beats HEAD beats HAND beats HEART.
   (Courage beats overthinking; thinking beats brute craft;
    craft/toughness wears down raw courage.)
   ================================================================== */
const TYPE_BEATS = { heart: "head", head: "hand", hand: "heart" };
function typeMult(attackEl, defendEl) {
  if (!attackEl || !defendEl) return 1;
  if (TYPE_BEATS[attackEl] === defendEl) return 1.5;
  if (TYPE_BEATS[defendEl] === attackEl) return 0.75;
  return 1;
}

     lean "smarter"  → trait slippery: dodges clever moves (head-element

   ================================================================== */

// Headless = running in a test harness (no browser). The game logic
// runs identically; only drawing/waiting is skipped.
const HEADLESS = (typeof document === "undefined");

function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
function lerp(a, b, t) { return a + (b - a) * t; }
// Deterministic per-position hash → stable grass/pebble variation.
function hash2(x, y) { let h = (x * 374761393 + y * 668265263) | 0; h = (h ^ (h >> 13)) * 1274126177; return ((h ^ (h >> 16)) >>> 0) / 4294967296; }
// Seedable RNG so battles can be replayed exactly in tests.
function makeRng(seed) {
  let s = seed >>> 0;
  return function () { s = (s * 1664525 + 1013904223) >>> 0; return s / 4294967296; };
}
function deepGet(obj, path) { return path.split(".").reduce((o, k) => o && o[k], obj); }
function deepSet(obj, path, value) {
  const keys = path.split("."); const last = keys.pop();
  let o = obj; for (const k of keys) { if (!(k in o)) o[k] = {}; o = o[k]; }
  o[last] = value;
}
const sleepReal = (ms) => HEADLESS ? Promise.resolve() : new Promise(r => setTimeout(r, ms));

/* ==================================================================
   SECTION 13 — INPUT
   ------------------------------------------------------------------
   Two key "sides" on purpose: WASD+E is Jack's side of the keyboard,
   Arrows+Space is Henry's. Both sides always WORK everywhere (so
   nobody gets stranded) — the labels teach whose turn is whose.
   ================================================================== */
const keys = { held: {}, queue: [] };
const KEYMAP = {
  up:    ["ArrowUp", "KeyW"], down: ["ArrowDown", "KeyS"],
  left:  ["ArrowLeft", "KeyA"], right: ["ArrowRight", "KeyD"],
  ok:    ["KeyE", "Space", "Enter"],
  swap:  ["KeyC"], help: ["KeyH"], mute: ["KeyM"], inv: ["KeyI"],
};
function keyAction(code) {
  for (const a in KEYMAP) if (KEYMAP[a].includes(code)) return a;
  return null;
}
function initInput() {
  // window-level + preventDefault on ALL action keys: stops Firefox's
  // quick-find / shortcuts from swallowing letters like H and I.
  window.addEventListener("keydown", (e) => {
    if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Space",
         "KeyE","KeyC","KeyH","KeyI","KeyM"].includes(e.code)) e.preventDefault();
    if (e.repeat) return;
    const a = keyAction(e.code);
    keys.held[e.code] = true;
    unlockAudio();
    if (a === "mute") { state.muted = !state.muted; return; }
    // H toggles help from ANY screen (explore, battle, cutscene, dialogue).
    // Handled here, centrally, so no per-mode key-reader can swallow it.
    // flush stale queued keys when opening overlays — a leftover "ok" in the
    // queue used to close Help the same frame it opened (H "stopped working")
    if (a === "help") { helpOpen = !helpOpen; keys.queue.length = 0; sfx("blip"); return; }
    // I opens the pockets while exploring (and always closes them)
    if (a === "inv" && (invOpen || state.mode === "explore" || state.mode === "sit")) {
      invOpen = !invOpen; keys.queue.length = 0; sfx("blip"); return;
    }
    if (a) keys.queue.push(a);
  });
  window.addEventListener("keyup", (e) => { keys.held[e.code] = false; });
}
function dirHeld() {
  for (const d of ["up", "down", "left", "right"])
    for (const code of KEYMAP[d]) if (keys.held[code]) return d;
  return null;
}
function popKey() { return keys.queue.shift() || null; }
function anyKeyHeld() { return Object.values(keys.held).some(Boolean); }

/* ------------------------------------------------------------------
   Tiny synth sound effects (WebAudio, generated in code — no files).
   ------------------------------------------------------------------ */
let audioCtx = null;
function unlockAudio() { if (!audioCtx && !HEADLESS) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} } }
function sfx(kind) {
  if (HEADLESS || state.muted || !audioCtx) return;
  const t = audioCtx.currentTime, o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  const P = {
    blip:   { f: 620, f2: 880, dur: 0.06, type: "square", vol: 0.04 },
    thud:   { f: 140, f2: 60,  dur: 0.12, type: "triangle", vol: 0.12 },
    heal:   { f: 520, f2: 1040, dur: 0.22, type: "sine", vol: 0.07 },
    bad:    { f: 220, f2: 110, dur: 0.2,  type: "sawtooth", vol: 0.05 },
    win:    { f: 523, f2: 784, dur: 0.35, type: "triangle", vol: 0.08 },
    step:   { f: 200, f2: 180, dur: 0.03, type: "triangle", vol: 0.015 },
  }[kind] || { f: 440, f2: 440, dur: 0.05, type: "sine", vol: 0.03 };
  o.type = P.type; o.frequency.setValueAtTime(P.f, t);
  o.frequency.exponentialRampToValueAtTime(Math.max(30, P.f2), t + P.dur);
  g.gain.setValueAtTime(P.vol, t); g.gain.exponentialRampToValueAtTime(0.0001, t + P.dur);
  o.start(t); o.stop(t + P.dur + 0.02);
}

/* ==================================================================
   SECTION 14 — ART GENERATION (all art is drawn in code)
   ================================================================== */
let cv, ctx;                 // main canvas
const T = CONFIG.tile;

// ---- tiles ---------------------------------------------------------------
// paints the shared grass ground: one base tone + soft hash-driven mottling,
// so open ground reads as a meadow instead of a hard checkerboard.
function paintGrass(g, sx, sy, tx, ty, dark) {
  g.fillStyle = dark ? "#1c2418" : PAL.grass2; g.fillRect(sx, sy, T, T);
  if (dark) return;
  // irregular mottle: a few small patches at hash-driven offsets (no grid feel)
  for (let i = 0; i < 3; i++) {
    const m = hash2(tx * 3 + i * 7 + 31, ty * 3 + i * 13 + 17);
    if (m > 0.45 && m < 0.72) continue;
    const mx = sx + ((m * 61) | 0) % 12, my = sy + ((m * 89) | 0) % 12;
    const mw = 2 + ((m * 37) | 0) % 3, mh = 2 + ((m * 53) | 0) % 2;
    g.fillStyle = m > 0.72 ? PAL.grass1 : PAL.grassLo;
    g.fillRect(mx, my, mw, mh);
  }
  const v = hash2(tx, ty);
  if (v > 0.62) { // a few short blades
    g.fillStyle = PAL.grass3;
    const bx = sx + 2 + ((v * 37) | 0) % 10, by = sy + 3 + ((v * 53) | 0) % 9;
    g.fillRect(bx, by, 1, 3); g.fillRect(bx + 3, by + 1, 1, 2);
  }
}
function drawTileAt(g, ch, sx, sy, tx, ty, frame, mapDef) {
  const v = hash2(tx, ty);
  // neighbor lookup so paths/water can shade their own edges
  const rows = mapDef.rows;
  const nb = (dx, dy) => (rows[ty + dy] && rows[ty + dy][tx + dx]) || " ";
  switch (ch) {
    case ".": case ",": {
      paintGrass(g, sx, sy, tx, ty, false);
      if (ch === ",") { g.fillStyle = PAL.grass3; g.fillRect(sx + 2, sy + 2, 5, 5); g.fillRect(sx + 9, sy + 8, 5, 5); }
      break;
    }
    case ":": {
      paintGrass(g, sx, sy, tx, ty, false);
      const fc = v > 0.5 ? "#e0d06a" : "#d67a9a";
      // plus-shaped blooms on stems so they read as flowers, not confetti
      const bloom = (bx, by) => {
        g.fillStyle = PAL.leaf2; g.fillRect(bx + 1, by + 3, 1, 3);
        g.fillStyle = fc;
        g.fillRect(bx, by + 1, 3, 1); g.fillRect(bx + 1, by, 1, 3);
        g.fillStyle = "#f8f4e8"; g.fillRect(bx + 1, by + 1, 1, 1);
      };
      bloom(sx + 3, sy + 3); bloom(sx + 10, sy + 8);
      break;
    }
    case ";": {
      paintGrass(g, sx, sy, tx, ty, false);
      const sway = ((frame >> 4) % 2);
      for (let i = 0; i < 4; i++) {
        const bx = sx + 2 + i * 4, off = (sway + i) % 2;
        g.fillStyle = PAL.grassLo; g.fillRect(bx + 1, sy + 5 + off, 2, 9);
        g.fillStyle = PAL.grass3; g.fillRect(bx, sy + 4 + off, 2, 10);
        g.fillStyle = PAL.leafHi; g.fillRect(bx, sy + 4 + off, 1, 3);
      }
      break;
    }
    case "-": {
      g.fillStyle = PAL.path; g.fillRect(sx, sy, T, T);
      // worn wheel-line texture + pebbles
      g.fillStyle = PAL.pathLo;
      if (v > 0.45) g.fillRect(sx + ((v * 31) | 0) % 11, sy + ((v * 17) | 0) % 11, 3, 2);
      if (v > 0.8) { g.fillStyle = PAL.pathEdge; g.fillRect(sx + ((v * 59) | 0) % 12, sy + ((v * 43) | 0) % 12, 2, 2); }
      // soft grassy shoulder wherever the path meets grass
      const soft = (c) => c === "." || c === "," || c === ":" || c === ";";
      g.fillStyle = PAL.pathEdge;
      if (soft(nb(0, -1))) g.fillRect(sx, sy, T, 2);
      if (soft(nb(0, 1)))  g.fillRect(sx, sy + T - 2, T, 2);
      if (soft(nb(-1, 0))) g.fillRect(sx, sy, 2, T);
      if (soft(nb(1, 0)))  g.fillRect(sx + T - 2, sy, 2, T);
      g.fillStyle = PAL.grass3;
      if (soft(nb(0, -1))) { g.fillRect(sx + 3, sy, 2, 1); g.fillRect(sx + 10, sy, 3, 1); }
      if (soft(nb(0, 1)))  { g.fillRect(sx + 5, sy + T - 1, 3, 1); g.fillRect(sx + 12, sy + T - 1, 2, 1); }
      break;
    }
    case "+": { g.fillStyle = "#8a6b48"; g.fillRect(sx, sy, T, T); g.fillStyle = "#6d5438"; for (let i = 0; i < 4; i++) g.fillRect(sx, sy + i * 4, T, 1); break; }

      g.fillStyle = "#3f3f4b"; g.fillRect(sx + 7, sy + 4, 1, 10);   // lit edge
      g.fillRect(sx + 6, sy + 3, 4, 1);                              // crossbar
      g.fillStyle = "#2e2e38";
      g.fillRect(sx + 5, sy + 2, 6, 1); g.fillRect(sx + 7, sy + 1, 2, 1); // cap + finial
      // the lantern box, hung under the cap
      g.fillStyle = "#1c1c26"; g.fillRect(sx + 4, sy + 3, 8, 6);
      g.fillStyle = lit ? "#ffd98a" : "#b8bfc9";
      g.fillRect(sx + 5, sy + 4, 6, 4);
      if (lit) { g.fillStyle = "#fff2cc"; g.fillRect(sx + 7, sy + 5, 2, 2); } // bright core
      g.fillStyle = "#1c1c26"; g.fillRect(sx + 7, sy + 3, 2, 6);    // muntin splits the panes
      break;
    }
    case "x": { paintGrass(g, sx, sy, tx, ty, false); g.fillStyle = PAL.stone; g.beginPath(); g.arc(sx + 8, sy + 9, 6, 0, 7); g.fill(); g.fillStyle = "#1d3a4d"; g.beginPath(); g.arc(sx + 8, sy + 9, 3, 0, 7); g.fill(); g.fillStyle = PAL.trunk; g.fillRect(sx + 2, sy + 2, 2, 8); g.fillRect(sx + 12, sy + 2, 2, 8); g.fillRect(sx + 2, sy + 2, 12, 2); break; }
    case "g": { paintGrass(g, sx, sy, tx, ty, false); g.fillStyle = "#6d5438"; g.fillRect(sx + 1, sy + 6, 14, 8); g.fillStyle = state.flags.troughFull ? "#356685" : "#4a3a28"; g.fillRect(sx + 2, sy + 7, 12, 5); break; }
    case "F": { paintGrass(g, sx, sy, tx, ty, false); g.fillStyle = "#c2a878"; g.beginPath(); g.arc(sx + 8, sy + 10, 6, 3.14, 0); g.fill(); g.fillRect(sx + 2, sy + 10, 12, 5); g.fillStyle = "#8a6b48"; g.fillRect(sx + 6, sy + 3, 4, 3); break; }
    case "q": { paintGrass(g, sx, sy, tx, ty, false); g.fillStyle = PAL.trunk; g.fillRect(sx + 2, sy + 8, 12, 6); g.fillStyle = "#8a6b48"; g.beginPath(); g.arc(sx + 5, sy + 8, 2.5, 0, 7); g.arc(sx + 10, sy + 8, 2.5, 0, 7); g.fill(); break; }
    case "*": {
      if (mapDef.outdoor === false) { // indoors it's a deep reading chair
        g.fillStyle = PAL.floor; g.fillRect(sx, sy, T, T);
        g.fillStyle = "rgba(0,0,0,0.15)"; g.fillRect(sx + 2, sy + 13, 12, 2);
        g.fillStyle = "#7a4a3e"; g.fillRect(sx + 2, sy + 2, 12, 12);   // back
        g.fillStyle = "#94594a"; g.fillRect(sx + 3, sy + 6, 10, 7);    // cushion
        g.fillStyle = "#7a4a3e"; g.fillRect(sx + 2, sy + 8, 2, 6); g.fillRect(sx + 12, sy + 8, 2, 6); // arms
        g.fillStyle = "#e0c088"; g.fillRect(sx + 6, sy + 3, 4, 2);     // a book left on the back
        break;
      }
      g.fillStyle = mapDef.dark ? "#1c2418" : PAL.grass2; g.fillRect(sx, sy, T, T);
      g.fillStyle = "#7d6343"; g.beginPath(); g.arc(sx + 8, sy + 9, 6, 0, 7); g.fill();
      g.fillStyle = "#93805a"; g.beginPath(); g.arc(sx + 8, sy + 9, 4, 0, 7); g.fill();
      g.strokeStyle = "#7d6343"; g.beginPath(); g.arc(sx + 8, sy + 9, 2, 0, 7); g.stroke();
      break;
    }
    case "B": { // bookshelf — spines of every color, shoulder to shoulder
      g.fillStyle = PAL.wallIn; g.fillRect(sx, sy, T, T);
      g.fillStyle = "#4d3826"; g.fillRect(sx + 1, sy + 1, 14, 15);
      const spineC = ["#c95a4f", "#5a8ac0", "#5aa06a", "#e0c088", "#9a7ab8", "#c47ab0"];
      for (let row = 0; row < 2; row++) {
        const by = sy + 3 + row * 6;
        g.fillStyle = "#3a2a1c"; g.fillRect(sx + 2, by + 5, 12, 1);   // shelf board
        for (let i = 0; i < 5; i++) {
          const sv = hash2(tx * 5 + i + row * 11, ty * 7 + i);
          g.fillStyle = spineC[(sv * 6) | 0];
          g.fillRect(sx + 2 + i * 2 + (sv > 0.5 ? 1 : 0), by + (sv > 0.7 ? 1 : 0), 2, 5 - (sv > 0.7 ? 1 : 0));
        }
      }
      g.fillStyle = "rgba(255,255,255,0.06)"; g.fillRect(sx + 1, sy + 1, 14, 1);
      break;
    }
    case "r": { // dresser — three drawers, brass knobs, secrets optional
      g.fillStyle = PAL.floor; g.fillRect(sx, sy, T, T);
      g.fillStyle = "rgba(0,0,0,0.15)"; g.fillRect(sx + 2, sy + 14, 12, 2);
      g.fillStyle = "#4d3826"; g.fillRect(sx + 1, sy + 1, 14, 14);
      g.fillStyle = "#634a32";
      g.fillRect(sx + 2, sy + 3, 12, 3); g.fillRect(sx + 2, sy + 7, 12, 3); g.fillRect(sx + 2, sy + 11, 12, 3);
      g.fillStyle = PAL.gold;
      g.fillRect(sx + 7, sy + 4, 2, 1); g.fillRect(sx + 7, sy + 8, 2, 1); g.fillRect(sx + 7, sy + 12, 2, 1);
      g.fillStyle = "rgba(255,255,255,0.07)"; g.fillRect(sx + 1, sy + 1, 14, 1);
      break;
    }
    case "d": { // pub wall with the dartboard (the twenty has given up)
      g.fillStyle = PAL.wallIn; g.fillRect(sx, sy, T, T);
      g.fillStyle = "#7d6349"; g.fillRect(sx, sy, T, 3);
      g.fillStyle = "rgba(255,255,255,0.06)"; g.fillRect(sx, sy + 3, T, 1);
      g.fillStyle = "#1c1c26"; g.beginPath(); g.arc(sx + 8, sy + 9, 5.5, 0, 7); g.fill();
      g.fillStyle = "#e8dcc2"; g.beginPath(); g.arc(sx + 8, sy + 9, 4, 0, 7); g.fill();
      g.fillStyle = "#8a4a3e"; g.beginPath(); g.arc(sx + 8, sy + 9, 2.5, 0, 7); g.fill();
      g.fillStyle = "#1c1c26"; g.fillRect(sx + 7, sy + 8, 2, 2);            // bullseye
      g.fillStyle = PAL.gold; g.fillRect(sx + 9, sy + 7, 1, 1);             // one proud dart
      g.fillStyle = "#3a2a1c"; g.fillRect(sx + 2, sy + 5, 1, 1); g.fillRect(sx + 13, sy + 12, 1, 1); // misses
      break;
    }
    case "M": { // the big maple's canopy — deep green with red flares
      paintGrass(g, sx, sy, tx, ty, false);
      const Mn = { u: nb(0, -1) === "M", d: nb(0, 1) === "M" || nb(0, 1) === "m", l: nb(-1, 0) === "M", r: nb(1, 0) === "M" };
      // leaf mass, inset a touch on outer edges
      const x0 = sx + (Mn.l ? 0 : 1), x1 = sx + T - (Mn.r ? 0 : 1);
      const y0 = sy + (Mn.u ? 0 : 2), y1 = sy + T - (Mn.d ? 0 : 1);
      g.fillStyle = PAL.leafLo; g.fillRect(x0, y0, x1 - x0, y1 - y0);
      // round the outer corners so the crown reads as one big tree
      const corner = (cx, cy, ax, ay) => {
        g.fillStyle = PAL.grass2; g.fillRect(cx, cy, 5, 5);
        g.fillStyle = PAL.leafLo; g.beginPath(); g.arc(ax, ay, 5, 0, 7); g.fill();
      };
      if (!Mn.u && !Mn.l) corner(x0, y0, x0 + 5, y0 + 5);
      if (!Mn.u && !Mn.r) corner(x1 - 5, y0, x1 - 5, y0 + 5);
      if (!Mn.d && !Mn.l) corner(x0, y1 - 5, x0 + 5, y1 - 5);
      if (!Mn.d && !Mn.r) corner(x1 - 5, y1 - 5, x1 - 5, y1 - 5);
      // inner texture: mid-tone clumps, lit crown, maple-red flares
      g.fillStyle = PAL.leaf1;
      for (let i = 0; i < 4; i++) {
        const m = hash2(tx * 4 + i * 9 + 3, ty * 4 + i * 5 + 11);
        g.fillRect(sx + 1 + ((m * 61) | 0) % 11, sy + 2 + ((m * 89) | 0) % 10, 4, 3);
      }
      if (!Mn.u) { g.fillStyle = PAL.leafHi; g.fillRect(x0 + 3, y0, 6, 2); g.fillRect(x0 + 10, y0 + 1, 3, 1); }
      const rf = hash2(tx * 7 + 2, ty * 3 + 5);
      g.fillStyle = "#b34a3a";
      g.fillRect(sx + 2 + ((rf * 37) | 0) % 10, sy + 3 + ((rf * 53) | 0) % 9, 3, 2);
      g.fillStyle = "#d96a4a";
      g.fillRect(sx + 3 + ((rf * 71) | 0) % 9, sy + 5 + ((rf * 29) | 0) % 7, 2, 1);
      if (!Mn.d) { g.fillStyle = "rgba(0,0,0,0.18)"; g.fillRect(x0 + 1, y1 - 2, x1 - x0 - 2, 2); } // shaded underside
      break;
    }
    case "m": { // the maple's trunk — broad, old, initials near the ground
      paintGrass(g, sx, sy, tx, ty, false);
      g.fillStyle = "rgba(0,0,0,0.22)"; g.beginPath(); g.ellipse(sx + 8, sy + 14, 8, 2.5, 0, 0, 7); g.fill();
      const left = nb(-1, 0) !== "m";  // outer side of a two-tile trunk
      g.fillStyle = PAL.trunkLo; g.fillRect(sx + (left ? 3 : 0), sy, left ? 13 : 13, 14);
      g.fillStyle = PAL.trunk;   g.fillRect(sx + (left ? 4 : 0), sy, left ? 6 : 8, 14);
      g.fillStyle = "rgba(0,0,0,0.18)";                                  // bark grooves
      g.fillRect(sx + (left ? 7 : 3), sy + 2, 1, 11); g.fillRect(sx + (left ? 10 : 10), sy + 1, 1, 12);
      g.fillStyle = PAL.trunkLo;                                          // root flare
      g.fillRect(sx + (left ? 2 : 0), sy + 12, left ? 4 : 5, 2); g.fillRect(sx + (left ? 12 : 11), sy + 12, 4, 2);
      if (left) { g.fillStyle = "#8a6b48"; g.fillRect(sx + 11, sy + 9, 3, 3); } // the carved patch
      break;
    }
    case "n": { // tent — canvas over a ridgepole, cloth tone varies per tent
      paintGrass(g, sx, sy, tx, ty, false);
      const cloth = v > 0.5 ? "#c2b090" : "#a8b0a0", clothLo = v > 0.5 ? "#a3927293" : "#8a948570";
      g.fillStyle = "rgba(0,0,0,0.18)"; g.fillRect(sx + 1, sy + 13, 14, 2);
      g.fillStyle = PAL.outline; g.beginPath(); g.moveTo(sx + 8, sy); g.lineTo(sx + 16, sy + 14); g.lineTo(sx, sy + 14); g.closePath(); g.fill();
      g.fillStyle = cloth; g.beginPath(); g.moveTo(sx + 8, sy + 1); g.lineTo(sx + 15, sy + 13); g.lineTo(sx + 1, sy + 13); g.closePath(); g.fill();
      g.fillStyle = clothLo; g.beginPath(); g.moveTo(sx + 8, sy + 1); g.lineTo(sx + 15, sy + 13); g.lineTo(sx + 8, sy + 13); g.closePath(); g.fill();
      g.fillStyle = "#4a3a2c"; g.fillRect(sx + 6, sy + 8, 4, 5); // door flap
      break;
    }
    case "j": { // house frame — new studs, no walls yet. It's a beginning.
      paintGrass(g, sx, sy, tx, ty, false);
      g.fillStyle = "rgba(0,0,0,0.15)"; g.fillRect(sx + 1, sy + 13, 14, 2);
      g.fillStyle = PAL.fenceHi;
      g.fillRect(sx + 2, sy + 2, 2, 12); g.fillRect(sx + 12, sy + 2, 2, 12); // studs
      g.fillRect(sx, sy + 1, T, 2);                                          // top plate
      g.fillStyle = PAL.fence; g.fillRect(sx + 2, sy + 7, 12, 1);            // noggin
      g.fillStyle = "rgba(255,255,255,0.10)"; g.fillRect(sx, sy + 1, T, 1);  // fresh-cut wood
      break;
    }
    case "y": { // the Elsewick bell, on a sledge by the water — until it isn't
      paintGrass(g, sx, sy, tx, ty, false);
      if (state.flags.bellRaised) break;   // raised into the frame; sledge empty
      g.fillStyle = "rgba(0,0,0,0.2)"; g.fillRect(sx + 1, sy + 13, 14, 2);
      g.fillStyle = "#6d5438"; g.fillRect(sx + 1, sy + 12, 14, 2);          // sledge
      g.fillStyle = PAL.outline; g.beginPath(); g.arc(sx + 8, sy + 8, 6, 0, 7); g.fill();
      g.fillStyle = "#8a7a3e"; g.beginPath(); g.arc(sx + 8, sy + 8, 5, 0, 7); g.fill(); // old bronze
      g.fillStyle = "#a89a52"; g.fillRect(sx + 5, sy + 4, 3, 2);             // worn shine
      g.fillStyle = "#5c512e"; g.fillRect(sx + 4, sy + 11, 8, 2);            // mouth
      g.fillStyle = "#4a3a2c"; g.fillRect(sx + 7, sy + 1, 2, 2);             // crown loop
      break;
    }
    case "Y": { // the bell frame — two posts and a crossbeam, waiting
      paintGrass(g, sx, sy, tx, ty, false);
      g.fillStyle = "rgba(0,0,0,0.15)"; g.fillRect(sx + 1, sy + 13, 14, 2);
      g.fillStyle = PAL.fenceLo; g.fillRect(sx + 2, sy + 3, 3, 11); g.fillRect(sx + 11, sy + 3, 3, 11);
      g.fillStyle = PAL.fence;   g.fillRect(sx + 2, sy + 3, 2, 11); g.fillRect(sx + 11, sy + 3, 2, 11);
      g.fillStyle = PAL.fenceHi; g.fillRect(sx + 1, sy + 2, 14, 2);
      if (state.flags.bellRaised) {
        g.fillStyle = "#8a7a3e"; g.beginPath(); g.arc(sx + 8, sy + 8, 4, 0, 7); g.fill();
        g.fillStyle = "#a89a52"; g.fillRect(sx + 6, sy + 5, 2, 2);
        g.fillStyle = "#5c512e"; g.fillRect(sx + 5, sy + 10, 6, 2);
      }
      break;
    }
    case "Z": { // Dad's cart, unhitched, empty. The lumber's already stacked.
      paintGrass(g, sx, sy, tx, ty, false);
      g.fillStyle = "rgba(0,0,0,0.18)"; g.fillRect(sx + 1, sy + 13, 14, 2);
      g.fillStyle = "#6d5438"; g.fillRect(sx + 1, sy + 5, 14, 6);
      g.fillStyle = "#8a6b48"; g.fillRect(sx + 1, sy + 5, 14, 2);
      g.fillStyle = PAL.outline; g.beginPath(); g.arc(sx + 4, sy + 12, 3, 0, 7); g.arc(sx + 12, sy + 12, 3, 0, 7); g.fill();
      g.fillStyle = "#4a3a2c"; g.beginPath(); g.arc(sx + 4, sy + 12, 2, 0, 7); g.arc(sx + 12, sy + 12, 2, 0, 7); g.fill();
      break;
    }
    case "J": { // a hoop nailed to a post. The net is somebody's old scarf.
      paintGrass(g, sx, sy, tx, ty, false);
      g.fillStyle = "#5c4530"; g.fillRect(sx + 7, sy + 4, 2, 12);            // post
      g.fillStyle = "#c9b491"; g.fillRect(sx + 3, sy + 1, 10, 7);            // board
      g.fillStyle = "#8a6b48"; g.fillRect(sx + 5, sy + 3, 6, 4);             // square
      g.strokeStyle = "#c95a4f"; g.lineWidth = 1;
      g.beginPath(); g.ellipse(sx + 8, sy + 8, 3, 1.5, 0, 0, 7); g.stroke(); // ring
      g.strokeStyle = "#e8e2d2";
      g.beginPath(); g.moveTo(sx + 6, sy + 9); g.lineTo(sx + 7, sy + 12); g.moveTo(sx + 10, sy + 9); g.lineTo(sx + 9, sy + 12); g.stroke(); // net
      break;
    }
    case "8": { // somebody's tower of salvaged blocks. Perfectly square. Obviously.
      paintGrass(g, sx, sy, tx, ty, false);
      g.fillStyle = "rgba(0,0,0,0.15)"; g.fillRect(sx + 3, sy + 14, 10, 2);
      const cubes = [["#8a8a92", 10], ["#8a6b48", 6], ["#5aa06a", 2]];
      for (let i = 0; i < 3; i++) {
        g.fillStyle = PAL.outline; g.fillRect(sx + 3, sy + cubes[i][1] - 1, 10, 5);
        g.fillStyle = cubes[i][0]; g.fillRect(sx + 4, sy + cubes[i][1], 8, 4);
        g.fillStyle = "rgba(255,255,255,0.14)"; g.fillRect(sx + 4, sy + cubes[i][1], 8, 1);
      }
      break;
    }
    case "e": { // the camp fire — the kettle is always just about ready
      paintGrass(g, sx, sy, tx, ty, false);
      g.fillStyle = "#5c5c66"; // stone ring
      for (let i = 0; i < 6; i++) { const a = i * 1.05; g.fillRect(sx + 7 + Math.cos(a) * 6, sy + 8 + Math.sin(a) * 5, 3, 2); }
      g.fillStyle = "#3a2e22"; g.fillRect(sx + 5, sy + 8, 6, 2);
      g.fillStyle = ((frame >> 4) % 2) ? "#e07a3a" : "#c95a2e";
      g.fillRect(sx + 6, sy + 5, 4, 4); g.fillRect(sx + 7, sy + 3 + ((frame >> 4) % 2), 2, 2);
      g.fillStyle = "#e0c088"; g.fillRect(sx + 7, sy + 6, 2, 2);
      break;
    }
    default: { g.fillStyle = PAL.grass1; g.fillRect(sx, sy, T, T); }
  }
}

// ---- people & creatures (procedural pixel sprites) ------------------------
const SPRITE_DEFS = {
  jack:   { h: 15, skin: "#e8c49a", hair: "#5d4632", top: PAL.jack,   bottom: "#3a4a63", accent: "#8fb3e8" },
  henry:  { h: 12, skin: "#e8c49a", hair: "#a34a3e", top: "#2fb3ac",  bottom: "#356b6b", accent: "#7fe3dc" },
  father: { h: 17, skin: "#d9b088", hair: "#4a3a2e", top: PAL.father, bottom: "#4d4438", accent: "#a3835c", broad: true },
  marla:  { h: 15, skin: "#e8c49a", hair: "#6d4a5c", top: "#c47ab0",  bottom: "#8a5a80", accent: "#f2ead8", dress: true },
  pip:    { h: 11, skin: "#d9a878", hair: "#3a2e20", top: "#5aa06a",  bottom: "#6d5438", accent: "#e0d06a", cap: true },
  bram:   { h: 16, skin: "#d9b088", hair: "#b8b8c0", top: "#8a8a92",  bottom: "#4d4438", accent: "#5c5c66", cane: true },
  tam:    { h: 14, skin: "#e8c49a", hair: "#7a5a38", top: "#7a8ab0",  bottom: "#4d4438", accent: "#a3b0c9" },
  wren:   { h: 14, skin: "#d9a878", hair: "#2e2620", top: "#c98a5a",  bottom: "#6d5438", accent: "#e0d06a" },
  winnie: { h: 15, skin: "#e8c49a", hair: "#8a4a3e", top: "#6d5438",  bottom: "#4d4438", accent: "#f2ead8", dress: true },
  dex:    { h: 13, skin: "#e8c49a", hair: "#3a2e20", top: "#5c5c66",  bottom: "#3d3d46", accent: "#6d6d78", cap: true },
  alder:  { h: 16, skin: "#d9b088", hair: "#9a9aa2", top: "#5c6b7a",  bottom: "#3d4450", accent: "#4a5866" },
  sorrel: { h: 16, skin: "#d9b088", hair: "#c9c9d0", top: "#8a9a8a",  bottom: "#4d4438", accent: "#5c6b5c", broad: true },
};
function drawPerson(g, def, px, py, dir, stepFrame, pose) {
  const h = def.h, w = def.broad ? 12 : 10, x = px + (T - w) / 2, y = py + (T - h);
  const OUT = "rgba(20,24,20,0.75)"; // soft dark edge so people pop off the ground
  if (pose === "sleep") { // lying down (Henry, before hens exist to him)
    g.fillStyle = OUT; g.fillRect(px + 1, py + 7, 14, 7);
    g.fillStyle = def.top; g.fillRect(px + 2, py + 8, 12, 5);
    g.fillStyle = "rgba(0,0,0,0.15)"; g.fillRect(px + 2, py + 11, 12, 2);
    g.fillStyle = def.skin; g.fillRect(px + 11, py + 7, 4, 4);
    g.fillStyle = def.hair; g.fillRect(px + 12, py + 5, 4, 3);
    return;
  }
  const step = pose === "walk" ? stepFrame % 2 : 0;
  const side = dir === "left" ? -1 : dir === "right" ? 1 : 0;
  // soft round shadow
  g.fillStyle = "rgba(0,0,0,0.25)";
  g.beginPath(); g.ellipse(px + 8, py + T - 1.5, w / 2 - 1, 2, 0, 0, 7); g.fill();
  const bodyH = h - 10;         // torso rows between head (6) and legs (5)
  // ---- outline silhouette (1px halo behind head+torso) ----
  g.fillStyle = OUT;
  g.fillRect(x, y - 1, w, 7);                 // around head
  g.fillRect(x, y + 4, w, bodyH + 2);         // around torso
  // ---- legs ----
  if (def.dress) {
    g.fillStyle = OUT; g.fillRect(x, y + h - 7, w, 7);
    g.fillStyle = def.bottom; g.fillRect(x + 1, y + h - 7, w - 2, 4);
    g.fillRect(x, y + h - 3, w, 3);           // skirt flares at the hem
    g.fillStyle = "rgba(0,0,0,0.15)"; g.fillRect(x + w - 3, y + h - 7, 3, 7);
  } else {
    const lL = 5 - (step ? 1 : 0), lR = 5 - (step ? 0 : 1);
    g.fillStyle = OUT;
    g.fillRect(x + 1, y + h - 5, 5, lL); g.fillRect(x + w - 6, y + h - 5, 5, lR);
    g.fillStyle = def.bottom;
    g.fillRect(x + 2, y + h - 5, 3, lL); g.fillRect(x + w - 5, y + h - 5, 3, lR);
    // shoes
    g.fillStyle = "#3a3228";
    g.fillRect(x + 2, y + h - 5 + lL - 1, 3, 1); g.fillRect(x + w - 5, y + h - 5 + lR - 1, 3, 1);
  }
  // ---- torso ----
  g.fillStyle = def.top; g.fillRect(x + 1, y + 5, w - 2, bodyH);
  g.fillStyle = "rgba(0,0,0,0.14)"; g.fillRect(x + w - 3, y + 5, 2, bodyH); // shaded side
  g.fillStyle = "rgba(255,255,255,0.10)"; g.fillRect(x + 1, y + 5, 2, bodyH); // lit side
  // ---- arms (swing on the walk, skin hands at the ends) ----
  const armY = y + 6, swingL = step ? 1 : 0, swingR = step ? 0 : 1;
  if (side === 0) {
    g.fillStyle = OUT; g.fillRect(x - 2, armY + swingL - 1, 3, 7); g.fillRect(x + w - 1, armY + swingR - 1, 3, 7);
    g.fillStyle = def.top; g.fillRect(x - 1, armY + swingL, 2, 5); g.fillRect(x + w - 1, armY + swingR, 2, 5);
    g.fillStyle = def.skin; g.fillRect(x - 1, armY + swingL + 4, 2, 2); g.fillRect(x + w - 1, armY + swingR + 4, 2, 2);
  } else { // side view: one arm in front
    const ax = side > 0 ? x + w - 2 : x;
    g.fillStyle = OUT; g.fillRect(ax - 1, armY + swingL - 1, 4, 7);
    g.fillStyle = def.top; g.fillRect(ax, armY + swingL, 2, 5);
    g.fillStyle = def.skin; g.fillRect(ax, armY + swingL + 4, 2, 2);
  }
  // ---- head ----
  g.fillStyle = def.skin; g.fillRect(x + 1, y, w - 2, 6);
  g.fillStyle = def.hair;
  if (dir === "up") {

// small vector icons used by menus/objectives (drawn, not emoji — same on every computer)
function drawIcon(g, name, x, y, s, color) {

  g.fillStyle = color || PAL.paper; g.strokeStyle = color || PAL.paper; g.lineWidth = 2;
  switch (name) {
    case "sword": g.save(); g.translate(8, 8); g.rotate(0.785); g.fillRect(-1, -7, 2, 10); g.fillRect(-4, 2, 8, 2); g.fillRect(-1, 4, 2, 3); g.restore(); break;
    case "shield": g.beginPath(); g.moveTo(8, 1); g.lineTo(14, 4); g.lineTo(13, 10); g.lineTo(8, 15); g.lineTo(3, 10); g.lineTo(2, 4); g.closePath(); g.fill(); break;
    case "heart": g.beginPath(); g.moveTo(8, 14); g.bezierCurveTo(1, 8, 3, 2, 8, 6); g.bezierCurveTo(13, 2, 15, 8, 8, 14); g.fill(); break;
    case "tank": g.fillRect(2, 6, 12, 7); g.fillRect(5, 3, 6, 4); g.beginPath(); g.arc(8, 8, 2, 0, 7); g.fillStyle = PAL.ink; g.fill(); break;
    case "gambit": g.beginPath(); g.moveTo(8, 1); g.lineTo(12, 8); g.lineTo(8, 15); g.lineTo(4, 8); g.closePath(); g.fill(); break;
    case "eye": g.beginPath(); g.ellipse(8, 8, 7, 4, 0, 0, 7); g.stroke(); g.beginPath(); g.arc(8, 8, 2, 0, 7); g.fill(); break;
    case "up": g.beginPath(); g.moveTo(8, 2); g.lineTo(14, 9); g.lineTo(10, 9); g.lineTo(10, 14); g.lineTo(6, 14); g.lineTo(6, 9); g.lineTo(2, 9); g.closePath(); g.fill(); break;
    case "down": g.beginPath(); g.moveTo(8, 14); g.lineTo(14, 7); g.lineTo(10, 7); g.lineTo(10, 2); g.lineTo(6, 2); g.lineTo(6, 7); g.lineTo(2, 7); g.closePath(); g.fill(); break;
    case "star": g.beginPath(); for (let i = 0; i < 10; i++) { const r = i % 2 ? 3 : 7, a = -1.57 + i * 0.628; g[i ? "lineTo" : "moveTo"](8 + r * Math.cos(a), 8 + r * Math.sin(a)); } g.closePath(); g.fill(); break;
    case "cake": g.fillRect(3, 8, 10, 6); g.beginPath(); g.arc(8, 8, 5, 3.14, 0); g.fill(); g.fillStyle = PAL.henry; g.fillRect(7, 3, 2, 3); break;
    case "goat": g.fillRect(3, 7, 8, 5); g.fillRect(9, 4, 4, 4); g.fillRect(10, 2, 1, 2); g.fillRect(12, 2, 1, 2); g.fillRect(4, 12, 2, 3); g.fillRect(8, 12, 2, 3); break;
    case "hen": g.beginPath(); g.arc(8, 9, 5, 0, 7); g.fill(); g.fillRect(10, 3, 2, 3); g.fillStyle = "#e0a83a"; g.fillRect(13, 8, 2, 2); break;
    case "drop": g.beginPath(); g.moveTo(8, 1); g.bezierCurveTo(13, 8, 13, 12, 8, 14); g.bezierCurveTo(3, 12, 3, 8, 8, 1); g.fill(); break;
    case "tool": g.save(); g.translate(8, 8); g.rotate(-0.6); g.fillRect(-6, -1, 9, 3); g.fillRect(3, -3, 4, 7); g.restore(); break;
    case "home": g.beginPath(); g.moveTo(8, 2); g.lineTo(14, 8); g.lineTo(12, 8); g.lineTo(12, 14); g.lineTo(4, 14); g.lineTo(4, 8); g.lineTo(2, 8); g.closePath(); g.fill(); break;
    case "x": g.lineWidth = 3; g.beginPath(); g.moveTo(3, 3); g.lineTo(13, 13); g.moveTo(13, 3); g.lineTo(3, 13); g.stroke(); break;
    case "key": g.beginPath(); g.arc(5, 8, 3, 0, 7); g.stroke(); g.fillRect(8, 7, 7, 2); g.fillRect(12, 9, 2, 3); break;

/* ==================================================================
   SECTION 15 — WORLD: actors, movement, collision, camera, lighting
   ================================================================== */
const ACTORS = {};   // everyone standing on a map right now
function makeActor(id, sprite, map, x, y, dir) {
  return { id, sprite, map, x, y, px: x * T, py: y * T, dir: dir || "down",
           moving: false, mx: 0, my: 0, prog: 0, hidden: false, pose: null,
           wander: null, stepFrame: 0 };
}
function setupActors() {
  ACTORS.jack = makeActor("jack", "jack", "upstairs", 8, 2, "down");
  ACTORS.henry = makeActor("henry", "henry", "upstairs", 14, 1, "down");
  ACTORS.henry.pose = "sleep";   // asleep ON his bed (his own room) until Jack wakes him
  // Bella the cat: lives downstairs, supervises everything, helps with nothing
  ACTORS.bella = makeActor("bella", "cat", "home", 13, 5, "left");
  ACTORS.bella.wander = { x1: 2, y1: 2, x2: 17, y2: 6, t: 0 };
  ACTORS.father = makeActor("father", "father", "village", 8, 6, "down");
  for (const id in NPCS) {
    // each NPC stands wherever this chapter's block puts them; villagers
    // without a block for the current chapter keep their ch1 "before" spot
    const p = NPCS[id]["ch" + currentChapter().id] || NPCS[id].ch1;
    if (!p) continue;
    ACTORS[id] = makeActor(id, NPCS[id].sprite, p.map, p.x, p.y, p.dir);
  }
  ACTORS.goat = makeActor("goat", "goat", "hollow", 20, 8, "left");
  // the two critters cornering the goat, visible on the hollow map
  ACTORS.burlhog_m = makeActor("burlhog_m", "burlhog", "hollow", 17, 9, "right");
  ACTORS.wickfinch_m = makeActor("wickfinch_m", "wickfinch", "hollow", 19, 8, "right");
  ACTORS.hen1 = makeActor("hen1", "hen", "village", 4, 6, "down");
  ACTORS.hen2 = makeActor("hen2", "hen", "village", 5, 8, "down");
  ACTORS.hen3 = makeActor("hen3", "hen", "village", 6, 7, "down");
  // wander stops at x=7 so no hen can slip into the pocket behind Dad (8,6)
  for (const h of ["hen1", "hen2", "hen3"]) ACTORS[h].wander = { x1: 3, y1: 6, x2: 7, y2: 8, t: 0 };
}
function mapRows(id) { return MAPS[id].rows; }
function tileAt(mapId, x, y) {
  const rows = mapRows(mapId);
  if (y < 0 || y >= rows.length || x < 0 || x >= rows[0].length) return "#";
  return rows[y][x];
}
function isSolid(mapId, x, y) {
  const ch = tileAt(mapId, x, y);
  if (SOLID.has(ch)) return true;
  return false;
}
function actorAt(mapId, x, y, ignore) {
  for (const id in ACTORS) {
    const a = ACTORS[id];
    if (!a.hidden && a.map === mapId && a.x === x && a.y === y && id !== ignore) return a;
  }
  return null;
}
const DIRV = { up: [0, -1], down: [0, 1], left: [-1, 0], right: [1, 0] };

function canStep(actor, dir) {
  const [dx, dy] = DIRV[dir];
  const nx = actor.x + dx, ny = actor.y + dy;
  if (isSolid(actor.map, nx, ny)) return false;
  const blocker = actorAt(actor.map, nx, ny, actor.id);
  if (blocker && !isFollower(blocker.id)) return false;
  // the hollow stays shut until the story opens it
  const tr = TRANSITIONS.find(t => t.map === actor.map && t.x === nx && t.y === ny);
  if (tr && tr.gated && !state.flags[tr.gateFlag || "hollowOpen"]) {
    if (actor.id === state.leader) playScene([{ do: "text", id: tr.blockedText || "hollow_blocked" }]);
    return false;
  }
  return true;
}
function startStep(actor, dir) {
  actor.dir = dir;
  if (!canStep(actor, dir)) return false;
  const [dx, dy] = DIRV[dir];
  actor.moving = true; actor.mx = dx; actor.my = dy; actor.prog = 0;
  return true;
}
function isFollower(id) {
  return followerOrder().includes(id) && id !== state.leader;
}
function followerOrder() {
  const others = state.soloControl ? [] : [state.leader === "jack" ? "henry" : "jack"];
  if (state.flags.goatFollowing) others.push("goat");
  return [state.leader, ...others];
}
// follower walks toward the tile the leader just left (breadcrumb trail)
const trail = [];
function pushTrail(x, y, map) { trail.unshift({ x, y, map }); if (trail.length > 8) trail.pop(); }

function updateActorStep(actor, dtMs) {
  if (!actor.moving) return;
  actor.prog += dtMs / CONFIG.stepMs;
  actor.stepFrame += dtMs / 90;
  if (actor.prog >= 1) {
    actor.x += actor.mx; actor.y += actor.my;
    actor.px = actor.x * T; actor.py = actor.y * T;
    actor.moving = false; actor.prog = 0;
    if (actor.id === state.leader) onLeaderArrive(actor);
  } else {
    actor.px = (actor.x + actor.mx * actor.prog) * T;
    actor.py = (actor.y + actor.my * actor.prog) * T;
  }
}
function onLeaderArrive(actor) {
  sfx("step");
  // map transition?
  const tr = TRANSITIONS.find(t => t.map === actor.map && t.x === actor.x && t.y === actor.y);
  if (tr) { doTransition(tr); return; }
  // story triggers (armed by the chapter script)
  checkTriggers(actor);
}
function doTransition(tr) {
  for (const id of followerOrder()) {
    const a = ACTORS[id];
    a.map = tr.to; a.x = tr.tx; a.y = tr.ty; a.px = tr.tx * T; a.py = tr.ty * T;
    a.dir = tr.dir; a.moving = false;
  }
  trail.length = 0;
  state.camSnap = true;
  onMapEnter(tr.to);
}
function updateFollowers(dtMs) {
  const order = followerOrder();
  for (let i = 1; i < order.length; i++) {
    const f = ACTORS[order[i]], lead = ACTORS[order[i - 1]];
    if (f.moving) continue;   // stepping happens once, centrally, in tick
    if (f.map !== lead.map) continue;
    const dist = Math.abs(f.x - lead.x) + Math.abs(f.y - lead.y);
    if (dist > 1) {
      // step toward the leader (axis with the bigger gap first)
      const dx = lead.x - f.x, dy = lead.y - f.y;
      const dirs = Math.abs(dx) >= Math.abs(dy)
        ? [dx > 0 ? "right" : "left", dy > 0 ? "down" : dy < 0 ? "up" : null]
        : [dy > 0 ? "down" : "up", dx > 0 ? "right" : dx < 0 ? "left" : null];
      for (const d of dirs) {
        if (!d) continue;
        const [ddx, ddy] = DIRV[d];
        const nx = f.x + ddx, ny = f.y + ddy;
        if (!isSolid(f.map, nx, ny) && !(nx === lead.x && ny === lead.y && dist === 2)) {
          f.dir = d; f.moving = true; f.mx = ddx; f.my = ddy; f.prog = 0; break;
        }
      }
      // truly stuck (e.g. squeezed behind a fence)? just catch up.
      if (!f.moving && dist > 4) { f.x = lead.x; f.y = lead.y + 1; f.px = f.x * T; f.py = f.y * T; }
    }
  }
}
function updateWanderers(dtMs) {
  for (const id in ACTORS) {
    const a = ACTORS[id];
    if (!a.wander || a.hidden) continue;
    if (a.moving) continue;   // stepping happens once, centrally, in tick
    a.wander.t -= dtMs;
    if (a.wander.t <= 0) {
      a.wander.t = 900 + hash2(a.x + performance.now() % 997 | 0, a.y) * 2200;
      const dirs = ["up", "down", "left", "right"];
      const d = dirs[(Math.random() * 4) | 0];
      const [dx, dy] = DIRV[d];
      const nx = a.x + dx, ny = a.y + dy;
      if (nx >= a.wander.x1 && nx <= a.wander.x2 && ny >= a.wander.y1 && ny <= a.wander.y2 &&
          !isSolid(a.map, nx, ny) && !actorAt(a.map, nx, ny, id)) {
        a.dir = d; a.moving = true; a.mx = dx; a.my = dy; a.prog = 0;
      }
    }
  }
}

// ---- camera ----------------------------------------------------------------
const cam = { x: 0, y: 0, tx: 0, ty: 0, holdOn: null };
function updateCamera(dtMs) {
  const mapDef = MAPS[ACTORS[state.leader].map];
  const mw = mapDef.rows[0].length * T, mh = mapDef.rows.length * T;
  let fx, fy;
  if (cam.holdOn) { fx = cam.holdOn[0] * T; fy = cam.holdOn[1] * T; }
  else { const L = ACTORS[state.leader]; fx = L.px; fy = L.py; }
  const spanX = mw - CONFIG.viewW * T, spanY = mh - CONFIG.viewH * T;
  // If a map is smaller than the screen (like the indoor rooms), CENTER it
  // instead of pinning it to the top-left corner.
  cam.tx = spanX <= 0 ? spanX / 2 : clamp(fx - (CONFIG.viewW * T) / 2 + T / 2, 0, spanX);
  cam.ty = spanY <= 0 ? spanY / 2 : clamp(fy - (CONFIG.viewH * T) / 2 + T / 2, 0, spanY);
  if (state.camSnap) { cam.x = cam.tx; cam.y = cam.ty; state.camSnap = false; }
  const k = 1 - Math.pow(0.0018, dtMs / 1000);   // smooth follow
  cam.x = lerp(cam.x, cam.tx, k); cam.y = lerp(cam.y, cam.ty, k);
}

// ---- lighting & particles ----------------------------------------------------
let lightCv = null, lightCtx = null, vignette = null;
const fireflies = [];
function initLightLayers() {
  lightCv = document.createElement("canvas"); lightCv.width = 480; lightCv.height = 320;
  lightCtx = lightCv.getContext("2d");
  vignette = document.createElement("canvas"); vignette.width = 480; vignette.height = 320;
  const vg = vignette.getContext("2d");
  const grad = vg.createRadialGradient(240, 160, 130, 240, 160, 330);
  grad.addColorStop(0, "rgba(0,0,0,0)"); grad.addColorStop(1, "rgba(0,0,0,0.34)");
  vg.fillStyle = grad; vg.fillRect(0, 0, 480, 320);
  for (let i = 0; i < 40; i++) fireflies.push({ x: Math.random() * 480, y: Math.random() * 320, p: Math.random() * 6.28, s: 0.3 + Math.random() * 0.7 });
}
const LIGHT_TINTS = {
  morning:     { tint: "rgba(255,214,150,0.10)", dark: 0 },
  noon:        { tint: null, dark: 0 },
  dusk:        { tint: "rgba(255,140,80,0.13)", dark: 0.38, darkColor: "#241a3d" },
  night:       { tint: null, dark: 0.55, darkColor: "#0d1230" },
  hollowNight: { tint: null, dark: 0.66, darkColor: "#070a18" },
};
function renderLighting(mapId, frame) {

/* ==================================================================
   SECTION 17 — CUTSCENE RUNNER + PAINTED SCENES
   ================================================================== */
const TESTHOOKS = { textLog: [], choicePicker: null, battleBot: null, paintLog: [] };
let sceneDepth = 0;
let letterboxT = 0; // 0..1 animated

function currentChapter() { return CHAPTERS[state.chapterIdx]; }

async function playScene(steps) {
  const prevMode = state.mode;
  sceneDepth++;
  if (state.mode === "explore" || state.mode === "boot" || state.mode === "title") state.mode = "scene";
  try {
    for (const s of steps) {
      switch (s.do) {
        case "text": await openDialogue(DIALOGUE[s.id]); break;
        case "say": await openDialogue([s.t]); break;
        case "hint": showHint(s.t); break;
        case "wait": await sleepReal(s.ms); break;
        case "letterbox": state.letterbox = s.on; break;
        case "light": state.light = s.v; break;
        case "objective": state.objective = { icon: s.icon, t: s.t }; state.objectiveFrame = frame; break;
        case "flag": deepSet(state, s.path, s.value); break;
        case "trust": addTrust(s.amt); break;
        case "give":
          if (s.coins) state.party.coins += s.coins;
          if (s.item) state.party.items.push(s.item);
          break;
        case "take": {
          const i = state.party.items.indexOf(s.item);
          if (i >= 0) state.party.items.splice(i, 1);
          break;
        }
        case "warp": {
          const who = s.who === "party" ? ["jack"] : [s.who];
          for (const id of who) {
            const a = ACTORS[id];
            a.map = s.map; a.x = s.x; a.y = s.y; a.px = s.x * T; a.py = s.y * T;
            if (s.hidden !== undefined) a.hidden = s.hidden;
          }
          if (s.who === "party") state.camSnap = true;
          break;
        }
        case "control":
          state.leader = s.who;
          state.soloControl = !!s.solo;
          break;
        case "face": ACTORS[s.who].dir = s.dir; break;
        case "hide": ACTORS[s.who].hidden = true; break;
        case "show": ACTORS[s.who].hidden = false; break;
        case "moveTo": { // walk an NPC up to the party (used for Pip's news)
          const a = ACTORS[s.who], L = ACTORS[state.leader];
          a.map = L.map;
          if (HEADLESS) { a.x = L.x; a.y = L.y + 1; }
          else {
            let guard = 60;
            while (Math.abs(a.x - L.x) + Math.abs(a.y - L.y) > 1 && guard-- > 0) {
              const dx = L.x - a.x, dy = L.y - a.y;
              // try the long axis first, then the other — one tree shouldn't end the walk
              const dirs = Math.abs(dx) > Math.abs(dy)
                ? [dx > 0 ? "right" : "left", dy > 0 ? "down" : dy < 0 ? "up" : null]
                : [dy > 0 ? "down" : "up", dx > 0 ? "right" : dx < 0 ? "left" : null];
              let stepped = false;
              for (const d of dirs) {
                if (!d) continue;
                const [mx, my] = DIRV[d];
                if (!isSolid(a.map, a.x + mx, a.y + my) && !actorAt(a.map, a.x + mx, a.y + my, a.id)) {
                  a.dir = d; a.moving = true; a.mx = mx; a.my = my; a.prog = 0;
                  while (a.moving) { await sleepReal(16); }
                  stepped = true; break;
                }
              }
              if (!stepped) break;
            }
            a.dir = a.y < L.y ? "down" : a.y > L.y ? "up" : (a.x < L.x ? "right" : "left");
          }
          break;
        }
        case "battle": await startBattle(s.id); break;
        case "choice": {
          const idx = await openChoiceUI(s.id);
          const opt = CHOICES[s.id].options[idx];
          await playScene(currentChapter().scenes[opt.scene]);
          break;
        }
        case "scene": await playScene(currentChapter().scenes[s.id]); break;
        case "await_trigger": state.armedTrigger = s.id; break;
        case "paint": await playPainting(s.id); break;
        case "paintBranch": {
          const id = state.flags.helpedBram ? "evening_helped" : "evening_cakes";
          await playPainting(id);
          break;
        }
        case "endcard": await playPainting("endcard"); break;
        case "next": advanceStage(); break;
        case "sfx": sfx(s.id); break;
      }
    }
  } finally {
    sceneDepth--;
    if (sceneDepth === 0 && state.mode === "scene") state.mode = "explore";
  }
}

// ---- painted scenes (the slow, cinematic ones) --------------------------------
const paint = { active: false, def: null, t: 0, lineIdx: -1, noise: null };
async function playPainting(id) {
  const def = PAINTINGS[id];
  if (HEADLESS) {
    TESTHOOKS.paintLog.push(id);
    if (def.dialogue) await openDialogue(DIALOGUE[def.dialogue]);
    if (def.endcard) state.chapterOver = true;
    return;
  }
  const prevMode = state.mode; state.mode = "paint";
  paint.active = true; paint.def = def; paint.t = 0; paint.lineIdx = -1;
  if (!paint.noise) buildBrushNoise();
  // slow reveal: hold on the image first, then lines arrive one key-press
  // (or one long beat) at a time. Deliberately unhurried.
  await sleepReal(1400);
  for (let i = 0; i < def.lines.length; i++) {
    paint.lineIdx = i;
    await waitKeyOrMs(def.endcard ? 2100 : 2600);
  }
  if (def.dialogue) await openDialogue(DIALOGUE[def.dialogue]);
  if (def.endcard) { state.chapterOver = true; await waitKeyOrMs(2400); }

}

      if (helpOpen) { t0 = performance.now() - el; return requestAnimationFrame(poll); }
      el = performance.now() - t0;
      let k, hit = false;
      while ((k = popKey())) if (k === "ok") hit = true;
      if (hit && el > 500) return resolve();
      if (el > ms) return resolve();
      requestAnimationFrame(poll);
    })();
  });
}

  paint.noise.width = 480; paint.noise.height = 320;
  const g = paint.noise.getContext("2d");
  for (let i = 0; i < 900; i++) {
    g.save();
    g.translate(Math.random() * 480, Math.random() * 320);
    g.rotate(Math.random() * 3.14);
    g.globalAlpha = 0.028;
    g.fillStyle = Math.random() > 0.5 ? "#ffffff" : "#000000";
    g.beginPath(); g.ellipse(0, 0, 14 + Math.random() * 26, 2 + Math.random() * 3, 0, 0, 7); g.fill();
    g.restore();
  }
}

// ---- stillness: sitting at a quiet spot -----------------------------------------
const sit = { active: false, t: 0, spot: null, done: false };
const SIT_SECONDS = 8;
async function trySit(spot) {

  const idx = await openChoiceUI("sit_choice");
  if (idx !== 0) return;
  if (HEADLESS) { finishSit(spot); return; }

}
function finishSit(spot) {

  sit.active = false; state.mode = "explore";

function updateSit(dtMs) {

  let k; let interrupted = false;
  while ((k = popKey())) if (sit.t > 900) interrupted = true;
  if (interrupted && sit.t < SIT_SECONDS * 1000) {
    sit.active = false; state.mode = "explore";
    playScene([{ do: "text", id: "sit_early" }]);

}
function renderSit() {
  // the world stays visible, but calms: dim edges, one slow breathing ring

  ctx.fillStyle = "#000"; ctx.fillRect(0, 0, 480, 26); ctx.fillRect(0, 294, 480, 26);
  const p = clamp(sit.t / (SIT_SECONDS * 1000), 0, 1);
  const breathe = 10 + Math.sin(sit.t * 0.0016) * 4;

  ctx.beginPath(); ctx.arc(240, 160, breathe + p * 6, 0, 7); ctx.stroke();

/* ==================================================================
   SECTION 18 — BATTLE SYSTEM
   ------------------------------------------------------------------
   Pure logic first (runs identically in the test harness), then the
   presentation (menus, sprites, animations) below it.

   The core teaching loop, in code form:
   - "stronger" enemies have thickHide → head-on damage is x0.35,
     but blocking their Charge STAGGERS them → damage becomes x1.6
     and they lose a turn. Bait, brace, punish.
   - "smarter" enemies are slippery → clever attacks (head-element
     or Gambit-boosted) miss 70% of the time; plain brave ones
     almost always land. Stop scheming, start swinging.
   ================================================================== */

function makeUnit(id, def, isAlly) {
  return {
    id, name: def.name, isAlly, el: def.el,
    base: Object.assign({}, def.stats),
    hp: def.stats.hp,
    mods: [],            // [{stat, mult, rounds}]
    statuses: {},        // {rattled: roundsLeft, sting: ..., staggered: ...}
    boost: null,         // {mult} from Sharp Trade, spent on next attack
    guarding: false,
    evade: 0,            // temporary dodge bonus (Read Them)
    trait: def.trait || null,
    lean: def.lean || null,
    moves: def.moves || [],
    sprite: def.sprite, color: def.color || PAL.paper,
    sparring: !!def.sparring, stance: null,
    nextMove: null, cycleIdx: 0,
  };
}
function statOf(u, key) {
  let v = u.base[key];
  for (const m of u.mods) if (m.stat === key) v *= m.mult;
  if (key === "atk" && u.statuses.rattled) v *= 0.7;
  return v;
}
function aliveUnits(list) { return list.filter(u => u.hp > 0); }

function makeBattle(encId, seed, opts) {
  opts = opts || {};
  const enc = ENCOUNTERS[encId];
  const chapter = CHAPTERS[state.chapterIdx];
  let allyIds = chapter.party;
  if (opts.only) allyIds = [opts.only];        // solo simulations (tests)
  const allies = allyIds.map(id => {
    const u = makeUnit(id, CHARACTERS[id], true);
    u.color = CHARACTERS[id].color;
    return u;
  });
  const foes = enc.enemies.map((id, i) => { const u = makeUnit(id + (i ? i : ""), ENEMIES[id], false); u.enemyId = id; return u; });
  const bt = {
    encId, enc, allies, foes, round: 0, rng: makeRng(seed || ((Math.random() * 1e9) | 0)),
    over: null, tank: null, reveal: 0, assistTrust: 0, usedHoldOn: false,
    spar: enc.enemies.includes("father_spar") ? { phase: "warmup", phaseRounds: 0, jackHit: false, henryHit: false, said: {} } : null,
    log: [],
  };
  for (const f of foes) f.nextMove = pickEnemyMove(bt, f);
  return bt;
}

// ---- enemy AI -------------------------------------------------------------
function pickEnemyMove(bt, u) {
  const def = ENEMIES[u.enemyId];
  if (def.ai === "cycle") {
    const mv = def.cycle[u.cycleIdx % def.cycle.length];
    return mv;
  }
  if (def.ai === "weighted") {
    const total = def.weights.reduce((s, w) => s + w[1], 0);
    let r = bt.rng() * total;
    for (const [mv, w] of def.weights) { r -= w; if (r <= 0) return mv; }
    return def.weights[0][0];
  }
  return "jab"; // scripted (sparring) decides at act time
}
function enemyChooseAction(bt, u) {
  if (bt.spar) return sparAction(bt, u);
  const def = ENEMIES[u.enemyId];
  let mv = u.nextMove;
  if (u.statuses.staggered) return { move: null, skip: true };
  if (mv === "telegraph")
    return { move: null, skip: true, telegraph: true,
             flavor: u.name + " paws the ground... something BIG is coming." };
  // pick a target: tank forces Henry; otherwise random-ish, Wickfinch prefers Jack
  const alive = aliveUnits(bt.allies);
  let target = alive[0];
  if (alive.length > 1) {
    if (u.enemyId === "wickfinch") target = alive.find(a => a.id === "jack") || alive[0];
    else target = alive[(bt.rng() * alive.length) | 0];
  }
  return { move: mv, target };
}
function advanceEnemyPlan(bt, u) {
  const def = ENEMIES[u.enemyId];
  if (def.ai === "cycle") u.cycleIdx++;
  u.nextMove = pickEnemyMove(bt, u);
}

// ---- the sparring script (Dad teaches, phase by phase) ----------------------
function sparSay(bt, key, events) {
  if (bt.spar.said[key]) return;
  bt.spar.said[key] = true;
  events.push({ type: "coach", line: COACH[key] });
}
function sparAction(bt, u) {
  const s = bt.spar;
  const henry = bt.allies.find(a => a.id === "henry");
  const jack = bt.allies.find(a => a.id === "jack");
  // he never presses exhausted kids
  const weakest = Math.min(...aliveUnits(bt.allies).map(a => a.hp / a.base.hp));
  if (weakest < 0.28 && s.phase !== "fox") return { move: null, skip: true, flavor: "Dad steps back. \"Breathe.\"" };
  if (s.phase === "warmup") return { move: null, skip: true, flavor: "Dad waits, arms open." };
  if (s.phase === "hurt") {
    const t = henry && henry.hp / henry.base.hp > 0.45 ? henry : null;
    if (t) return { move: "jab", target: t };
    return { move: null, skip: true, flavor: "Dad circles, watching Jack." };
  }
  if (s.phase === "oak") {
    // telegraph one round, swing the next — the bait-and-brace lesson
    if (u.stance !== "oak") u.stance = "oak";
    if (u.statuses.staggered) return { move: null, skip: true };
    if (s.oakTelegraphed) { s.oakTelegraphed = false; return { move: "swing", target: henry || jack }; }
    s.oakTelegraphed = true;
    return { move: null, skip: true, flavor: "Dad plants his feet. Something big is coming.", telegraph: true };
  }
  if (s.phase === "fox") {
    u.stance = "fox";
    return { move: "jab", target: jack && jack.hp > 1 ? jack : henry };
  }
  return { move: null, skip: true };
}
function sparAfterAction(bt, actor, action, events) {
  const s = bt.spar; if (!s) return;
  const father = bt.foes[0];
  if (actor.isAlly) {
    const mv = action.move && MOVES[action.move];
    if (mv && mv.kind === "attack") { if (actor.id === "jack") s.jackHit = true; else s.henryHit = true; }
    if (s.phase === "warmup" && s.jackHit && s.henryHit) { s.phase = "hurt"; s.phaseRounds = 0; }
    if (s.phase === "hurt" && mv && mv.kind === "assist") {
      sparSay(bt, "assistOk", events);
      s.phase = "oak"; s.phaseRounds = 0; s.oakIntro = true;
      sparSay(bt, "oak", events); sparSay(bt, "tankTip", events);
    }
    if (s.phase === "oak") {
      const lastDmg = events.filter(e => e.type === "dmg" && e.targetId === father.id).pop();
      if (lastDmg && lastDmg.resisted) { sparSay(bt, "oakBounce", events); sparSay(bt, "oakHow", events); }
      if (lastDmg && (lastDmg.amount >= 12 || father.statuses.staggered)) {
        sparSay(bt, "oakDown", events);
        s.phase = "fox"; s.phaseRounds = 0;
        sparSay(bt, "fox", events);
      }
    } else if (s.phase === "fox") {
      const dodged = events.find(e => e.type === "dodge" && e.targetId === father.id && actor.id === "jack");
      if (dodged) sparSay(bt, "foxDodge", events);
      const landed = events.find(e => e.type === "dmg" && e.targetId === father.id && actor.id === "henry");
      if (landed) { sparSay(bt, "foxHit", events); bt.over = "win"; }
    }
  }
}
function sparRoundEnd(bt, events) {
  const s = bt.spar; if (!s) return;
  s.phaseRounds++;
  // never let the lesson stall — each phase moves on eventually
  if (s.phaseRounds >= 5) {
    const orderNext = { warmup: "hurt", hurt: "oak", oak: "fox", fox: null };
    const nxt = orderNext[s.phase];
    if (s.phase === "hurt") sparSay(bt, "hurt", events);
    if (nxt) {
      s.phase = nxt; s.phaseRounds = 0;
      if (nxt === "oak") { sparSay(bt, "oak", events); sparSay(bt, "tankTip", events); }
      if (nxt === "fox") sparSay(bt, "fox", events);
    } else bt.over = "win";
  }
  if (s.phase === "hurt") {
    const henry = bt.allies.find(a => a.id === "henry");
    if (henry && henry.hp / henry.base.hp <= 0.6) sparSay(bt, "hurt", events);
  }
}

// ---- resolving one action ----------------------------------------------------
function act(bt, actor, action) {
  const events = [];
  if (bt.round === 1 && bt.spar && !bt.spar.said.start) sparSay(bt, "start", events);
  if (action.skip) {
    if (actor.statuses.staggered) events.push({ type: "msg", t: actor.name + " is flat on the ground!" });
    else events.push({ type: "msg", t: action.flavor || actor.name + " waits." });
    if (action.telegraph) events.push({ type: "telegraph", who: actor.id });
    return events;
  }
  const mv = MOVES[action.move];
  if (action.item) {  // using a snack from the Help menu
    const it = ITEMS[action.item];
    const idx = state.party.items.indexOf(action.item);
    if (idx >= 0) state.party.items.splice(idx, 1);
    const heal = Math.min(it.heal, action.target.base.hp - action.target.hp);
    action.target.hp += heal;
    events.push({ type: "heal", targetId: action.target.id, amount: heal, t: `${actor.name} shares the ${it.name}. ${action.target.name} +${heal} HP!` });
    return events;
  }
  switch (mv.kind) {
    case "guard":
      actor.guarding = true;
      events.push({ type: "msg", t: actor.name + " braces!" });
      break;
    case "sig":
      applySignature(bt, actor, mv, events);
      break;
    case "assist":
      applyAssist(bt, actor, action, mv, events);
      break;
    case "attack":
      applyAttack(bt, actor, action, mv, events);
      break;
  }
  sparAfterAction(bt, actor, action, events);
  checkBattleEnd(bt);
  return events;
}
function applySignature(bt, actor, mv, events) {
  if (mv.effect === "tank") {
    bt.tank = actor.id;
    actor.mods.push({ stat: "def", mult: 1.6, rounds: 1 });
    events.push({ type: "msg", big: true, t: "HENRY plants his feet. \"OVER HERE!\"" });
    events.push({ type: "msg", t: "Every attack will come at Henry this turn." });
  } else if (mv.effect === "gambitSharp") {
    actor.mods.push({ stat: "def", mult: 0.5, rounds: 1 });
    actor.boost = { mult: 2.2 };

    titleG = titleCv.getContext("2d");
  }
  drawTitleVillage(frame * 16);
  ctx.save();
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(titleCv, 0, 0, 120, 80, 0, 0, 480, 320);
  ctx.restore();
  // scrim so the text reads over the scenery
  ctx.fillStyle = titlePage === 0 ? "rgba(10,12,24,0.42)" : "rgba(10,12,24,0.78)";
  ctx.fillRect(0, 0, 480, 320);
  // drifting feather
  const t = frame * 0.02;
  const fx = 240 + Math.sin(t * 0.7) * 60, fy = 70 + Math.sin(t * 0.4) * 14 + (frame % 600) * 0.04;
  ctx.save(); ctx.translate(fx, Math.min(fy, 110)); ctx.rotate(Math.sin(t * 0.5) * 0.3);
  ctx.fillStyle = "rgba(242,234,216,0.9)";
  ctx.beginPath(); ctx.ellipse(0, 0, 4, 16, 0.3, 0, 7); ctx.fill();
  ctx.strokeStyle = "rgba(180,170,150,0.9)"; ctx.beginPath(); ctx.moveTo(-1, -14); ctx.lineTo(2, 16); ctx.stroke();
  ctx.restore();
  if (titlePage === 2) { // choose a chapter
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.font = "bold 15px monospace"; ctx.fillStyle = PAL.gold;
    ctx.fillText("CHOOSE A CHAPTER", 240, 70);
    CHAPTERS.forEach((ch, i) => {
      const y = 128 + i * 52, sel = i === titleSel;
      if (sel) {
        ctx.fillStyle = "rgba(232,193,90,0.10)";
        roundRect(ctx, 90, y - 20, 300, 42, 6); ctx.fill();
        ctx.strokeStyle = "rgba(232,193,90,0.6)"; ctx.lineWidth = 1; ctx.stroke();
        ctx.fillStyle = PAL.gold; ctx.font = "bold 12px monospace"; ctx.textAlign = "left";
        ctx.fillText(">", 102, y);
      }
      ctx.textAlign = "center";
      ctx.font = (sel ? "bold " : "") + "13px monospace";
      ctx.fillStyle = sel ? PAL.paper : PAL.paperDim;
      ctx.fillText(ch.title.toUpperCase(), 240, y - 7);
      ctx.font = "italic 12px Georgia, serif";
      ctx.fillStyle = sel ? PAL.paperDim : "rgba(207,196,171,0.55)";
      ctx.fillText(ch.subtitle, 240, y + 11);
    });
    ctx.font = "11px monospace"; ctx.fillStyle = PAL.paperDim; ctx.textAlign = "center";
    ctx.fillText("UP / DOWN to choose", 240, 252);
    if ((frame >> 5) % 2) { ctx.fillStyle = PAL.gold; ctx.font = "bold 12px monospace"; ctx.fillText("press E or SPACE to begin", 240, 282); }
    return;
  }
  if (titlePage === 0) {
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.font = "bold 34px Georgia, serif"; ctx.fillStyle = PAL.paper;
    ctx.shadowColor = "rgba(232,193,90,0.35)"; ctx.shadowBlur = 18;
    ctx.fillText("F E A T H E R L I G H T", 240, 158);
    ctx.shadowBlur = 0;
    ctx.font = "italic 14px Georgia, serif"; ctx.fillStyle = PAL.paperDim;
    ctx.fillText("in " + CHAPTERS.length + " chapters", 240, 192);
    ctx.font = "11px monospace"; ctx.fillStyle = PAL.paperDim;
    ctx.fillText("a game for two brothers", 240, 232);
    if ((frame >> 5) % 2) { ctx.fillStyle = PAL.gold; ctx.font = "bold 12px monospace"; ctx.fillText("press E or SPACE", 240, 276); }
  } else {
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.font = "bold 15px monospace"; ctx.fillStyle = PAL.gold;
    ctx.fillText("TWO BROTHERS, ONE KEYBOARD", 240, 56);
    ctx.font = "12px monospace";
    const rows = [
      ["", ""],
      ["JACK (big brother)", "WASD to move · E to choose"],
      ["HENRY (little brother)", "Arrows to move · SPACE to choose"],
      ["", ""],
      ["Walk with", "arrows or WASD"],
      ["Talk & do things", "E or SPACE"],
      ["Swap brothers", "C"],
      ["Pockets (items)", "I"],
      ["Help", "H"],
    ];
    rows.forEach((r, i) => {
      const y = 88 + i * 22;
      ctx.textAlign = "right"; ctx.fillStyle = r[0].includes("JACK") ? PAL.jack : r[0].includes("HENRY") ? PAL.henry : PAL.paperDim;
      ctx.font = (r[0].includes("(") ? "bold " : "") + "12px monospace";
      ctx.fillText(r[0], 226, y);
      ctx.textAlign = "left"; ctx.fillStyle = PAL.paper; ctx.font = "12px monospace";
      ctx.fillText(r[1], 250, y);
    });
    if ((frame >> 5) % 2) { ctx.fillStyle = PAL.gold; ctx.font = "bold 12px monospace"; ctx.textAlign = "center"; ctx.fillText("press E or SPACE", 240, 288); }
  }
}

/* ---- boot & main loop ------------------------------------------------------ */
let lastT = 0;
function tick(now) {
  requestAnimationFrame(tick);
  const dt = Math.min(50, now - (lastT || now)); lastT = now;
  frame++;
  // one thing reads the keyboard at a time (dialogue > choice > mode)
  if (helpOpen) { let k; while ((k = popKey())) if (k === "help" || k === "ok") helpOpen = false; }
  else if (invOpen) { let k; while ((k = popKey())) if (k === "ok") invOpen = false; }
  else if (dlg.active) updateDialogue(dt);
  else if (choiceUI.active) updateChoice();
  else if (state.mode === "title") updateTitle();
  else if (state.mode === "explore") updateExplore(dt);
  else if (state.mode === "sit") updateSit(dt);
  else if (state.mode === "battle") updateBattleMenu();
  // the world keeps breathing during scenes and sitting
  if (["explore", "scene", "sit"].includes(state.mode)) {
    // step EVERY moving actor — scene walks (Pip's news!) used to hang
    // forever because only followers and wanderers ever finished a step
    for (const id in ACTORS) updateActorStep(ACTORS[id], dt);
    updateFollowers(dt); updateWanderers(dt); updateCamera(dt);
  }
  render(dt);
}
function updateExplore(dt) {
  let k;
  while ((k = popKey())) {
    if (k === "ok") { interact(); return; }
    if (k === "swap") trySwapLeader();
    if (k === "help") helpOpen = true;
  }
  const L = ACTORS[state.leader];
  if (!L.moving) {
    const d = dirHeld();
    if (d) {
      if (startStep(L, d)) pushTrail(L.x, L.y, L.map);
      else L.dir = d;
    }
  }
}
function render(dt) {
  ctx.clearRect(0, 0, 480, 320);
  if (state.mode === "title") renderTitle();
  else if (state.mode === "battle" && bUI.bt) renderBattle(dt);
  else if (state.mode === "paint" && paint.active) renderPainting(dt);
  else { renderExplore(); if (sit.active) renderSit(); }
  renderLetterbox(dt);
  renderDialogue();
  renderChoice();
  renderHint();
  renderInventory();
  renderHelp();
}
function fitCanvas() {
  const scale = Math.max(1, Math.min((window.innerWidth / 480) | 0, (window.innerHeight / 320) | 0));
  cv.style.width = (480 * scale) + "px"; cv.style.height = (320 * scale) + "px";
}
function boot() {
  cv = document.getElementById("screen");
  ctx = cv.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  initInput();
  initLightLayers();
  setupActors();
  state.mode = "title";
  fitCanvas();
  window.addEventListener("resize", fitCanvas);
  requestAnimationFrame(tick);
}

/* ==================================================================
   TEST EXPORTS — lets the test harness (and curious parents, via the
   browser console: window.GAME) poke at the game's insides.
   ================================================================== */
const GAME = {
  // data
  CONFIG, PAL, CHARACTERS, MOVES, STATUSES, ENEMIES, ENCOUNTERS, NPCS,
  DIALOGUE, COACH, CHOICES, MAPS, SOLID, TRANSITIONS, QUIET_SPOTS, READABLES,
  CHAPTERS, CHAPTER1, ITEMS, PAINTINGS, TYPE_BEATS,
  TRIGGER_DEFS, TRIGGER_SCENES,
  // state
  getState: () => state,
  reset: () => { state = makeState(); trail.length = 0; setupActors(); return state; },
  makeState, trustLevel, addTrust,
  // world
  tileAt, isSolid, actorAt, ACTORS, setupActors, DIRV,
  // battle core
  typeMult, makeUnit, makeBattle, statOf, aliveUnits, act, endRound,
  turnOrder, enemyChooseAction, advanceEnemyPlan, checkBattleEnd,
  runBattleHeadless, menuFor, submenuFor, defaultBot,
  // test-only hooks for exercising the real battle RENDER path headlessly
  _renderBattleFrame: (dt) => { if (typeof renderBattle === "function") renderBattle(dt); },
  _setBattleUI: (bt) => { bUI.bt = bt; bUI.phase = "anim"; bUI.msg = null; bUI.banner = null; },
  _isHelpOpen: () => helpOpen,
  _renderExplore: () => { frame++; renderExplore(); },
  // test-only: put a painting on screen without driving the whole scene
  _showPainting: (id) => { paint.def = PAINTINGS[id]; paint.active = true; paint.t = 1200; paint.lineIdx = 0; state.mode = "paint"; },
  _renderPainting: (dt) => renderPainting(dt),
  // story
  playScene, advanceStage, fireTrigger, currentStage, stageIndexById,
  npcTalk, interact, onMapEnter, currentChapter, beginChapter,
  TESTHOOKS,
};
if (HEADLESS) { globalThis.GAME = GAME; }
else { window.GAME = GAME; boot(); }
